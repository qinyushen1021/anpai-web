<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f3" />
    <meta name="description" content="安排：吃、喝、玩，直接给你一个附近去处。" />
    <link rel="icon" href="./app-icon.png?v=sources4" />
    <link rel="stylesheet" href="./style.css?v=sources4" />
    <title>安排</title>
  </head>
  <body>
    <main class="app" id="app">
      <header class="topbar">
        <div class="brand">
          <img src="./app-icon.png?v=sources4" alt="" />
          <div><strong>安排</strong><span>不用再说随便</span></div>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="preferencesButton" type="button" aria-label="我的偏好" title="我的偏好">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10M18 7h2M4 17h2M10 17h10M14 4v6M6 14v6" /></svg>
          </button>
          <button class="icon-button favorite-entry" id="favoritesButton" type="button" aria-label="下次再去" title="下次再去">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3.8h12a1 1 0 0 1 1 1V21l-7-4-7 4V4.8a1 1 0 0 1 1-1Z" /></svg>
            <span class="count-badge hidden" id="favoriteCount">0</span>
          </button>
        </div>
      </header>

      <button class="location-button" id="locationButton" type="button">
        <span class="location-mark"></span><span id="locationText">获取位置</span><span class="location-refresh">更新</span>
      </button>

      <section class="decision-head">
        <h1>现在想做什么？</h1>
        <nav class="mood-switch" aria-label="选择类型">
          <button class="mood active" data-mood="food" type="button">吃</button>
          <button class="mood" data-mood="drink" type="button">喝</button>
          <button class="mood" data-mood="play" type="button">玩</button>
        </nav>
        <div class="occasion-switch" aria-label="选择场合">
          <button class="occasion" data-occasion="business" type="button"><strong>商务</strong><small>稳妥好谈</small></button>
          <button class="occasion active" data-occasion="friends" type="button"><strong>朋友</strong><small>热闹好聊</small></button>
          <button class="occasion" data-occasion="date" type="button"><strong>约会</strong><small>氛围舒服</small></button>
          <button class="occasion" data-occasion="solo" type="button"><strong>自己</strong><small>轻松自在</small></button>
        </div>
        <button class="filter-summary" id="filterSummary" type="button" aria-label="查看当前筛选">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h10M18 7h2M4 17h2M10 17h10M14 4v6M6 14v6" /></svg>
          <span id="filterSummaryText">3km内</span><small>修改</small>
        </button>
      </section>

      <section class="state-panel" id="startPanel">
        <div class="state-symbol"><span></span></div>
        <h2>先看看你附近</h2>
        <p>位置只留在你的设备里，用来找附近值得去的地方。</p>
        <button class="primary" id="startLocate" type="button">使用我的位置</button>
      </section>

      <section class="loading-panel hidden" id="loadingPanel" aria-live="polite">
        <div class="loading-line wide"></div><div class="loading-line"></div><div class="loading-block"></div>
        <p>正在挑附近合适的地方</p>
      </section>

      <section class="result hidden" id="resultPanel" aria-live="polite">
        <article class="recommendation" id="recommendation">
          <div class="result-topline">
            <span id="resultKicker">就去这家</span>
            <div class="card-tools">
              <button class="mini-button" id="saveButton" type="button" aria-label="收藏这家" title="收藏">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3.8h12a1 1 0 0 1 1 1V21l-7-4-7 4V4.8a1 1 0 0 1 1-1Z" /></svg>
              </button>
              <button class="mini-button" id="shareButton" type="button" aria-label="分享这家" title="分享">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15V3M8 7l4-4 4 4M5 11v9h14v-9" /></svg>
              </button>
            </div>
          </div>
          <h2 id="placeName"></h2>
          <div class="reason-chips" id="reasonChips"></div>
          <p id="placeReason"></p>
          <div class="place-visual" id="placeVisual" role="button" tabindex="0" aria-label="查看地点详情"><span class="pin-shape"></span></div>
          <div class="place-facts" id="placeFacts"></div>
          <div class="result-actions">
            <a class="primary" id="navigateButton" href="#" target="_blank" rel="noopener">开始导航</a>
            <button class="secondary" id="detailButton" type="button">查看详情</button>
          </div>
        </article>

        <button class="shuffle" id="shuffleButton" type="button"><span>换一家</span><small id="remainingText"></small></button>
        <button class="source-fallback hidden" id="dianpingMoreButton" type="button"><span>这里选择不够多</span><strong>去大众点评看图和更多店</strong></button>

        <section class="alternatives-wrap" aria-labelledby="alternativesTitle">
          <h2 id="alternativesTitle">另外两个备选</h2>
          <div class="alternatives" id="alternatives"></div>
        </section>
      </section>

      <section class="error-panel hidden" id="errorPanel" aria-live="polite">
        <h2 id="errorTitle">这次没拿到附近地点</h2>
        <p id="errorText">位置已经拿到，地点服务暂时没有返回。</p>
        <div class="error-actions">
          <button class="primary" id="retryButton" type="button">重新推荐</button>
          <a class="secondary" id="mapSearchButton" href="#" target="_blank" rel="noopener">去地图看看</a>
          <button class="secondary wide" id="dianpingSearchButton" type="button">去大众点评找更多</button>
        </div>
      </section>
    </main>

    <dialog class="sheet detail" id="detailDialog">
      <div class="sheet-header"><strong>地点详情</strong><button class="sheet-close" data-close="detailDialog" type="button" aria-label="关闭">完成</button></div>
      <div id="detailContent"></div>
    </dialog>

    <dialog class="sheet" id="preferencesDialog">
      <div class="sheet-header"><strong>筛选</strong><button class="sheet-close" data-close="preferencesDialog" type="button" aria-label="关闭">完成</button></div>
      <div class="sheet-body preferences-body">
        <p class="filter-help">选中的距离和偏好会严格限制推荐结果。</p>
        <section class="preference-section">
          <div class="section-title"><h2>距离</h2><span id="rangeHint"></span></div>
          <div class="range-switch" id="rangeSwitch">
            <button data-range="km1" type="button"><strong>1km内</strong><small>最近</small></button>
            <button data-range="km3" type="button"><strong>3km内</strong><small>附近</small></button>
            <button data-range="km5" type="button"><strong>5km内</strong><small>多找些</small></button>
            <button data-range="more" type="button"><strong>更多</strong><small>15km内</small></button>
          </div>
        </section>
        <section class="preference-section"><h2>吃</h2><div class="interest-grid" data-interest-group="food"></div></section>
        <section class="preference-section"><h2>喝</h2><div class="interest-grid" data-interest-group="drink"></div></section>
        <section class="preference-section"><h2>玩</h2><div class="interest-grid" data-interest-group="play"></div></section>
        <section class="preference-section"><h2>氛围</h2><div class="interest-grid" data-interest-group="vibe"></div></section>
        <button class="clear-preferences" id="clearPreferences" type="button">清空偏好</button>
      </div>
    </dialog>

    <dialog class="sheet" id="favoritesDialog">
      <div class="sheet-header"><strong>下次再去</strong><button class="sheet-close" data-close="favoritesDialog" type="button" aria-label="关闭">完成</button></div>
      <div class="sheet-body favorites-body" id="favoritesContent"></div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./app.js?v=sources4"></script>
  </body>
</html>
