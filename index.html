<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f3" />
    <meta name="description" content="安排：吃、喝、玩，直接给你一个附近去处。" />
    <link rel="icon" href="./app-icon.png?v=590f274" />
    <link rel="stylesheet" href="./style.css?v=590f274" />
    <title>安排</title>
  </head>
  <body>
    <main class="app" id="app">
      <header class="topbar">
        <div class="brand"><img src="./app-icon.png?v=590f274" alt="" /><div><strong>安排</strong><span>不用再说随便</span></div></div>
        <button class="location-button" id="locationButton" type="button"><span class="location-mark"></span><span id="locationText">获取位置</span></button>
      </header>

      <section class="decision-head">
        <h1>现在想做什么？</h1>
        <nav class="mood-switch" aria-label="选择类型">
          <button class="mood active" data-mood="food" type="button">吃</button>
          <button class="mood" data-mood="drink" type="button">喝</button>
          <button class="mood" data-mood="play" type="button">玩</button>
        </nav>
        <div class="occasion-switch" aria-label="选择场合">
          <button class="occasion" data-occasion="business" type="button">商务</button>
          <button class="occasion active" data-occasion="friends" type="button">朋友</button>
          <button class="occasion" data-occasion="date" type="button">约会</button>
          <button class="occasion" data-occasion="solo" type="button">自己</button>
        </div>
      </section>

      <section class="state-panel" id="startPanel">
        <div class="state-symbol"><span></span></div>
        <h2>先看看你附近</h2>
        <p>位置只用于这次推荐，不会保存精确地址。</p>
        <button class="primary" id="startLocate" type="button">使用我的位置</button>
      </section>

      <section class="loading-panel hidden" id="loadingPanel" aria-live="polite">
        <div class="loading-line wide"></div><div class="loading-line"></div><div class="loading-block"></div>
        <p>正在挑附近合适的地方</p>
      </section>

      <section class="result hidden" id="resultPanel" aria-live="polite">
        <article class="recommendation" id="recommendation">
          <div class="result-topline"><span id="resultKicker">就去这家</span><span id="distanceText"></span></div>
          <h2 id="placeName"></h2>
          <p id="placeReason"></p>
          <div class="place-visual" id="placeVisual"><span class="pin-shape"></span></div>
          <div class="result-actions">
            <a class="primary" id="navigateButton" href="#" target="_blank" rel="noopener">带我去</a>
            <button class="secondary" id="saveButton" type="button">收藏</button>
          </div>
        </article>

        <button class="shuffle" id="shuffleButton" type="button"><span>换一家</span><small id="remainingText"></small></button>

        <div class="alternatives" id="alternatives"></div>
      </section>

      <section class="error-panel hidden" id="errorPanel" aria-live="polite">
        <h2>先去地图里看看</h2>
        <p id="errorText">附近地点暂时没有返回，位置已经拿到了。</p>
        <div class="error-actions">
          <button class="primary" id="retryButton" type="button">重新推荐</button>
          <a class="secondary" id="mapSearchButton" href="#" target="_blank" rel="noopener">打开高德地图</a>
        </div>
      </section>
    </main>

    <dialog class="detail" id="detailDialog">
      <button class="detail-close" id="detailClose" type="button" aria-label="关闭">关闭</button>
      <div id="detailContent"></div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./app.js?v=590f274"></script>
  </body>
</html>
